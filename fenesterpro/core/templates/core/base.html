<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FenesterPro{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        twisty: {
                            50: '#fff5f2',
                            100: '#ffe8e0',
                            500: '#ff5a36',
                            600: '#e54523',
                            900: '#7a1f0a',
                        },
                        ui: {
                            bg: '#f4f5f8',
                            surface: '#ffffff',
                            text: '#1a1f36',
                            muted: '#6b7280',
                            border: '#e5e7eb'
                        }
                    },
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.04)',
                        'float': '0 20px 40px -10px rgba(0,0,0,0.08)',
                    },
                    borderRadius: {
                        '3xl': '1.5rem',
                        '4xl': '2rem',
                    }
                }
            }
        }
    </script>
    <!-- Font -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f5f8; color: #1a1f36; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex flex-col min-h-screen">
    
    <!-- Top Navigation -->
    <nav class="w-full px-6 py-5 md:px-10 flex items-center justify-between z-50 max-w-7xl mx-auto border-b border-transparent">
        <!-- Logo -->
        <a href="{% url 'core:dashboard' %}" class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-twisty-500 text-white flex items-center justify-center shadow-lg shadow-twisty-500/30 transform transition hover:rotate-12 duration-300">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2z" /></svg>
            </div>
            <span class="text-xl font-extrabold tracking-tight text-ui-text hidden sm:block">FenesterPro</span>
        </a>

        <!-- Center Nav Links -->
        <div class="hidden md:flex items-center gap-2 bg-white px-2 py-2 rounded-full border border-slate-200 shadow-sm">
            <a href="{% url 'core:dashboard' %}" class="px-5 py-2 text-sm font-bold rounded-full transition-all flex items-center gap-2 {% if request.resolver_match.app_name == 'core' %}bg-slate-100 text-twisty-600{% else %}text-ui-muted hover:text-ui-text hover:bg-slate-50{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                Dashboard
            </a>
            <a href="{% url 'projects:list' %}" class="px-5 py-2 text-sm font-bold rounded-full transition-all flex items-center gap-2 {% if request.resolver_match.app_name == 'projects' or request.resolver_match.app_name == 'reports' %}bg-slate-100 text-twisty-600{% else %}text-ui-muted hover:text-ui-text hover:bg-slate-50{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Projects
            </a>
        </div>

        <!-- Right Side Actions -->
        <div class="flex items-center gap-4">
            <a href="{% url 'projects:new' %}" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-ui-text text-white rounded-full text-sm font-bold hover:bg-black transition-all shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                New Project
            </a>
            <div class="w-10 h-10 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm flex items-center justify-center text-slate-500 font-bold">
                FP
            </div>
        </div>
    </nav>

    <!-- Main Application Area -->
    <main class="flex-1 w-full px-4 md:px-10 pb-12 flex flex-col items-center">
        <!-- We constrict max width for ultra-wide screens to maintain proportions -->
        <div class="w-full max-w-7xl flex-1 flex flex-col pt-4">
            
            <!-- Global Flash Messages -->
            {% if messages %}
                <div class="mb-6 flex flex-col gap-2 w-full">
                {% for message in messages %}
                    <div class="px-4 py-3 rounded-2xl border text-sm font-bold flex items-center gap-2
                        {% if message.tags == 'error' %}bg-red-50 text-red-600 border-red-100
                        {% else %}bg-green-50 text-green-700 border-green-100{% endif %}">
                        {% if message.tags == 'error' %}
                            <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        {% else %}
                            <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        {% endif %}
                        {{ message }}
                    </div>
                {% endfor %}
                </div>
            {% endif %}
            
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
